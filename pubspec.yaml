name: readly
description: "Personal kcal tracker, meal maker & article summarizer"
publish_to: 'none'

version: 3.0.0+5

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  # State & navigation
  flutter_riverpod: ^3.3.2
  go_router: ^17.3.0

  # Local database
  drift: ^2.34.1
  drift_flutter: ^0.3.0

  # Scanning & food data
  mobile_scanner: ^7.2.0
  http: ^1.6.0

  # Article synthesis (legacy feature)
  share_handler: ^0.0.25
  html: ^0.15.6

  # Storage & misc
  flutter_secure_storage: ^10.3.1
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.2
  google_fonts: ^8.1.0
  cupertino_icons: ^1.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.34.0
  build_runner: ^2.4.15
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/
